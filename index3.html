<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shirley Tranças | Arte Afro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { gold: '#D4AF37', dark: '#0A0A0A', goldLight: '#F3E5AB' } 
                    },
                    fontFamily: { 
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .avatar-wrapper { @apply relative w-44 h-44 rounded-full overflow-hidden border-2 border-brand-gold bg-brand-dark z-10; }
            .avatar-img, .avatar-logo { @apply absolute inset-0 w-full h-full object-cover rounded-full; }
            .avatar-img { animation: profilePeekOnce 6s cubic-bezier(0.4, 0, 0.2, 1) 1 forwards; z-index: 1; }
            .avatar-logo { animation: logoPeekOnce 6s cubic-bezier(0.4, 0, 0.2, 1) 1 forwards; z-index: 2; pointer-events: none; }
            .btn-premium { @apply flex items-center justify-between w-full py-4 px-6 rounded-2xl font-semibold transition-all duration-300 transform hover:scale-[1.02] active:scale-95; }
            .glass-card { @apply bg-white/5 border border-white/10 backdrop-blur-sm; }
            .share-btn { @apply fixed top-6 right-6 z-50 p-3 rounded-full bg-white/5 border border-white/10 backdrop-blur-md text-brand-gold hover:bg-brand-gold hover:text-brand-dark transition-all shadow-2xl; }
        }

        @keyframes profilePeekOnce {
            0%, 15% { opacity: 1; transform: scale(1); }
            25%, 75% { opacity: 0; transform: scale(0.8); }
            85%, 100% { opacity: 1; transform: scale(1); }
        }
        @keyframes logoPeekOnce {
            0%, 15% { opacity: 0; transform: scale(0.8); }
            25%, 75% { opacity: 1; transform: scale(1.1); }
            85%, 100% { opacity: 0; transform: scale(0.8); }
        }

        body { background: #0A0A0A; color: #ffffff; overflow-x: hidden; }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col items-center px-6 py-12">

    <button onclick="sharePage()" class="share-btn">
        <i data-lucide="share-2" class="w-5 h-5"></i>
    </button>

    <div id="content" class="max-w-md w-full flex flex-col items-center flex-grow">
        
        <header class="w-full flex flex-col items-center text-center mb-12">
            <div class="relative w-52 h-52 mb-6 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border border-dashed border-brand-gold/30 animate-[spin_20s_linear_infinite]"></div>
                <div class="avatar-wrapper shadow-[0_0_50px_rgba(212,175,55,0.15)]">
                    <img src="/img/ft-perfil.png" alt="Shirley" class="avatar-img" />
                    <img src="/img/logo.jpeg" alt="Logo" class="avatar-logo" />
                </div>
                <div class="absolute -bottom-2 bg-brand-gold text-brand-dark text-[10px] font-black px-6 py-1.5 rounded-full uppercase tracking-[0.2em] shadow-xl z-20">
                    Agenda Aberta
                </div>
            </div>

            <h1 class="text-3xl font-serif italic text-white/90 mb-1 leading-tight">Shirley Tranças</h1>
            <p class="text-brand-goldLight/50 text-[11px] font-bold uppercase tracking-[0.5em]">Arte & Estilo Afro</p>
        </header>

        <main class="w-full space-y-4">
            
            <a href="https://wa.me/5598981638054" target="_blank" class="btn-premium bg-gradient-to-r from-brand-gold to-[#B8860B] text-brand-dark shadow-xl shadow-brand-gold/10 font-bold uppercase text-xs tracking-widest">
                <span class="flex items-center gap-3">
                    <i data-lucide="calendar-check" class="w-5 h-5"></i>
                    Agendar Horário
                </span>
                <i data-lucide="chevron-right" class="w-4 h-4 opacity-50"></i>
            </a>

            <a href="https://www.instagram.com/shirleytrancas_/" target="_blank" class="btn-premium glass-card text-white/90">
                    <span class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-brand-gold fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5zm4.25 2.25a6.25 6.25 0 1 1 0 12.5a6.25 6.25 0 0 1 0-12.5zm0 1.5a4.75 4.75 0 1 0 0 9.5a4.75 4.75 0 0 0 0-9.5zm5.25.75a1 1 0 1 1 0 2a1 1 0 0 1 0-2z"/>
                    </svg>
                        Instagram | Ver Trabalhos
                </span>
                <i data-lucide="image" class="w-4 h-4 opacity-30"></i>
            </a>

            <a href="#" target="_blank" class="btn-premium glass-card text-white/90">
                <span class="flex items-center gap-3">
                    <i data-lucide="map-pin" class="w-5 h-5 text-brand-gold"></i> 
                    Nossa Localização
                </span>
                <i data-lucide="map" class="w-4 h-4 opacity-30"></i>
            </a>

        </main>

        <footer class="mt-auto pt-20 pb-8 text-center w-full">
            <p class="text-brand-gold/30 font-bold text-[10px] tracking-[0.5em] uppercase mb-4">São Luís - Maranhão</p>
            
            <div class="flex flex-col items-center space-y-2">
                <p class="text-[9px] text-white/30 uppercase tracking-[0.15em] font-medium">
                    © 2024 Shirley Tranças • Todos os direitos reservados
                </p>
                <div class="h-[1px] w-12 bg-white/5"></div>
                <p class="text-[9px] text-white/20 uppercase tracking-widest font-semibold">
                    Desenvolvido por 
                    <a href="https://wa.me/5598984021537" target="_blank" class="text-brand-gold/50 hover:text-brand-gold transition-colors underline decoration-brand-gold/20 underline-offset-4">
                        MenuBairro
                    </a>
                </p>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'Shirley Tranças',
                    text: 'Confira as tranças afro da Shirley!',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copiado!');
            }
        }
    </script>
</body>
</html>
