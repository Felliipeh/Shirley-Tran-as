    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { 
                            gold: '#D4AF37',
                            dark: '#0A0A0A',
                            goldLight: '#F3E5AB'
                        } 
                    },
                    fontFamily: { 
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    animation: {
                        'fade-up': 'fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'border-move': 'borderGradientMove 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(32px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        },
                        borderGradientMove: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' }
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .avatar-container { @apply relative w-44 h-44 mb-6 flex items-center justify-center; }
            .avatar-ring {
                @apply absolute inset-0 rounded-full p-1 bg-gradient-to-r from-brand-gold via-transparent to-brand-gold bg-[length:400%_400%] animate-border-move shadow-2xl z-0;
            }
            .avatar-img {
                @apply w-full h-full object-cover rounded-full border-[3px] border-brand-dark bg-brand-dark shadow-xl z-10;
            }
            .btn-premium {
                @apply flex items-center justify-center gap-3 w-full py-4 px-6 rounded-xl font-medium transition-all duration-300 transform hover:-translate-y-1 active:scale-95;
            }
            .gold-text {
                @apply bg-clip-text text-transparent bg-gradient-to-b from-brand-goldLight via-brand-gold to-brand-gold font-serif;
            }
        }
    </style>
</head>

    <script>
        async function handleShare() {
            try {
                if (navigator.share) {
                    await navigator.share({ 
                        title: 'Shirley Tranças', 
                        text: 'Confira as tranças afro da Shirley!',
                        url: window.location.href 
                    });
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Link copiado!');
                }
            } catch (e) { console.warn('Share falhou'); }
        }
    </script>
