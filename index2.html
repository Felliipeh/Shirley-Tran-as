<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { gold: '#D4AF37', dark: '#050505', surface: '#121212' } 
                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }

        }

    <style type="text/tailwindcss">
        @layer components {
            body {
                background: #040404;
                background-attachment: fixed;
            }
            .profile-ring {
                @apply relative rounded-full p-1 mb-6 flex items-center justify-center;
                background: linear-gradient(135deg, #D4AF37 0%, #050505 50%, #D4AF37 100%);
            }
            .profile-img-container {
                @apply w-40 h-40 relative overflow-hidden rounded-full border-4 border-brand-dark;
            }
            .profile-img-base {
                @apply absolute inset-0 w-full h-full object-cover transition-opacity duration-700;
            }
            .nav-link {
                @apply flex items-center justify-between w-full p-4 rounded-2xl bg-brand-surface/80 backdrop-blur-sm border border-white/5 transition-all duration-300 hover:border-brand-gold/40 active:scale-[0.98];
            }
            .nav-link-primary {
                @apply flex items-center justify-center gap-3 w-full py-4 px-8 rounded-full bg-brand-gold text-black font-bold text-sm tracking-widest uppercase transition-all duration-300 hover:brightness-110 active:scale-[0.98] shadow-lg shadow-brand-gold/10;
            }
            .gold-divider {
                @apply w-24 h-[3px] mx-auto rounded-full;
                background: linear-gradient(90deg, #8A6E2F 0%, #D4AF37 50%, #8A6E2F 100%);
            }
            .reveal { animation: reveal 0.8s ease forwards; opacity: 0; }
        }
        @keyframes reveal { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

            <!-- 2. Catálogo -->
            <a href="https://wa.me/c/559881638054" target="_blank" class="nav-link">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-white/5 rounded-lg text-brand-gold">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    <div class="p-2 bg-white/5 rounded-lg text-brand-gold">

            <p class="text-[11px] mb-1">
                © Todos os direitos reservados a <span class="text-brand-gold font-bold">Shirley Tranças</span>
            </p>
            <p class="text-[9px] text-white/20 uppercase tracking-wider">Desenvolvido por <a href="https://lipecode.menubairro.com.br/" class="text-brand-gold/50 font-bold underline" target="_blank">MenuBairro</a></p>
        </footer>
    </main>

    <script>
        const handleShare = async () => {
            const data = {
                title: 'Shirley Tranças',
                text: 'Especialista em Tranças Afro em São Luís',
                url: window.location.href
            };
            try {
                if (navigator.share) {
                    await navigator.share(data);
                } else {
                    await navigator.clipboard.writeText(data.url);
                    alert('Link copiado!');
                }
            } catch (err) { }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const mainImg = document.getElementById('profileMain');
            const altImg = document.getElementById('profileAlt');
            setTimeout(() => {
                mainImg.classList.add('opacity-0');
                altImg.classList.replace('opacity-0', 'opacity-100');
            }, 3000);
        });
    </script>
</body>
</html>
